services:
  kg:
    image: gyorilab/coda.kg:latest
    build:
      context: .
      dockerfile: Dockerfile.kg
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"  # Neo4j Browser
      - "${NEO4J_BOLT_PORT:-7687}:7687"  # Neo4j Bolt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  inference:
    image: gyorilab/coda.inference:latest
    build:
      context: .
      dockerfile: Dockerfile.inference
    ports:
      - "${CODA_INFERENCE__PORT:-5123}:${CODA_INFERENCE__PORT:-5123}"
    env_file:
      - path: .env
        required: false
    environment:
      CODA_INFERENCE__HOST: ${CODA_INFERENCE__HOST:-0.0.0.0}
      CODA_INFERENCE__PORT: ${CODA_INFERENCE__PORT:-5123}
      CODA_INFERENCE__LLM__PROVIDER: ${CODA_INFERENCE__LLM__PROVIDER:-openai}
      CODA_INFERENCE__LLM__MODEL: ${CODA_INFERENCE__LLM__MODEL:-gpt-5.4-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODA_LLM__OLLAMA__BASE_URL: ${CODA_LLM__OLLAMA__BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${CODA_INFERENCE__PORT:-5123}/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    image: gyorilab/coda.app:latest
    build:
      context: .
      dockerfile: Dockerfile.app
      # CPU-only build (default). For a GPU host, build with
      # COMPUTE_DEVICE=cuda, run with the NVIDIA container runtime, and add a
      # `deploy.resources.reservations.devices` GPU reservation here.
      args:
        COMPUTE_DEVICE: ${COMPUTE_DEVICE:-cpu}
    ports:
      - "${CODA_APP__PORT:-8000}:${CODA_APP__PORT:-8000}"
    env_file:
      - path: .env
        required: false
    environment:
      CODA_APP__HOST: ${CODA_APP__HOST:-0.0.0.0}
      CODA_APP__PORT: ${CODA_APP__PORT:-8000}
      CODA_DIALOGUE__TRANSCRIBER_BACKEND: ${CODA_DIALOGUE__TRANSCRIBER_BACKEND:-whisper-livekit}
      CODA_INFERENCE__URL: ${CODA_INFERENCE__URL:-http://inference:${CODA_INFERENCE__PORT:-5123}}
      CODA_INFERENCE__LLM__PROVIDER: ${CODA_INFERENCE__LLM__PROVIDER:-openai}
      CODA_INFERENCE__LLM__MODEL: ${CODA_INFERENCE__LLM__MODEL:-gpt-5.4-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODA_LLM__OLLAMA__BASE_URL: ${CODA_LLM__OLLAMA__BASE_URL:-http://host.docker.internal:11434}
      CODA_KG__URL: ${CODA_KG__URL:-bolt://kg:7687}
      CODA_GROUNDER__RAG__LLM__PROVIDER: ${CODA_GROUNDER__RAG__LLM__PROVIDER:-openai}
      CODA_GROUNDER__RAG__LLM__MODEL: ${CODA_GROUNDER__RAG__LLM__MODEL:-gpt-4o-mini}
      CODA_GROUNDER__RAG__RETRIEVER__ONTOLOGY: ${CODA_GROUNDER__RAG__RETRIEVER__ONTOLOGY:-icd10}
      CODA_GROUNDER__RAG__RERANKER__ENABLED: ${CODA_GROUNDER__RAG__RERANKER__ENABLED:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      inference:
        condition: service_healthy
